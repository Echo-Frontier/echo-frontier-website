<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Availability</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,sans-serif; }
body { background:#0f0f14; color:#e6e6eb; }

header { padding:32px 24px 20px; text-align:center; }
.header-title { display:inline-flex; align-items:center; gap:14px; }
.header-title img { height:2.4rem; }
.header-title h1 { font-size:2.4rem; font-weight:600; letter-spacing:.05em; }

nav {
  position:sticky; top:0;
  height:56px;
  background:#151520;
  display:flex;
  justify-content:center;
  align-items:center;
  border-bottom:1px solid #2a2a3a;
}
nav a {
  color:#cfcfe8;
  text-decoration:none;
  margin:0 28px;
  font-weight:500;
}
nav a.active { color:#6aa6ff; }

main {
  max-width:1200px;
  margin:40px auto;
  padding:0 24px;
}

h2 { font-size:2rem; margin-bottom:16px; }

.availability-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

#editButton {
  padding:6px 16px;
  font-size:1rem;
  background:#6aa6ff;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
#editButton:hover { background:#5590e0; }

/* --- SAME GRID STYLES AS edit.html --- */

.edit-wrapper {
  display:flex;
  flex-direction:column;
  gap:4px;
  overflow-x:auto;
}

.days-header {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.days-header div {
  text-align:center;
  font-size:.9rem;
  color:#b9b9cc;
}

.time-grid-wrapper {
  display:grid;
  grid-template-columns:auto 1fr;
  gap:4px;
}

.time-labels {
  display:flex;
  flex-direction:column;
}
.time-labels div {
  height:22px;
  line-height:20px;
  font-size:.7rem;
  color:#b9b9cc;
  text-align:right;
  padding-right:4px;
}

.availability-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}

.availability-cell {
  width:100%;
  height:20px;
  background:#444454;
  border-radius:2px;
}
</style>
</head>

<body>

<header>
  <div class="header-title">
    <img src="icon.png">
    <h1>Echo Frontier</h1>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="members.html">Members</a>
  <a href="availability.html" class="active">Availability</a>
</nav>

<main>
  <div class="availability-header">
    <h2>Members Availability</h2>
    <button id="editButton" onclick="location='edit.html'">Edit</button>
  </div>

  <div class="edit-wrapper">
    <div class="days-header" id="daysHeader"></div>
    <div class="time-grid-wrapper">
      <div class="time-labels" id="timeLabels"></div>
      <div class="availability-grid" id="availabilityGrid"></div>
    </div>
  </div>
</main>

<script>
async function loadAvailability() {
  try {
    const res = await fetch('https://YOUR_NETLIFY_SITE.netlify.app/.netlify/functions/saveAvailability');
    const values = await res.json();

    // Map sheet data to grid cells
    // cells = 7 days × 48 slots = 336 cells per person
    const personIndex = 0; // change 0-4 for Person 1–5

    for (let row = 0; row < 48*7; row++) {
      const day = row % 7;
      const slotIndex = Math.floor(row / 7);

      const cell = window.availabilityCells.find(c =>
        parseInt(c.dataset.row) === slotIndex &&
        parseInt(c.dataset.day) === day
      );

      if (!cell) continue;

      const val = parseInt(values[row]?.[personIndex+1] || 0); // +1 to skip time column
      if (val) cell.style.backgroundColor = "#6aa6ff";
      else cell.style.backgroundColor = "#444454";
    }
  } catch (err) {
    console.error("Failed to load availability:", err);
  }
}

// Load on page load
window.addEventListener('DOMContentLoaded', loadAvailability);
</script>


</body>
</html>
