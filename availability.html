<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Availability</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,sans-serif; }
body { background:#0f0f14; color:#e6e6eb; }

header { padding:32px 24px 20px; text-align:center; }
.header-title { display:inline-flex; align-items:center; gap:14px; }
.header-title img { height:2.4rem; }
.header-title h1 { font-size:2.4rem; font-weight:600; letter-spacing:.05em; }

nav {
  position:sticky; top:0;
  height:56px;
  background:#151520;
  display:flex;
  justify-content:center;
  align-items:center;
  border-bottom:1px solid #2a2a3a;
}
nav a {
  color:#cfcfe8;
  text-decoration:none;
  margin:0 28px;
  font-weight:500;
}
nav a.active { color:#6aa6ff; }

main {
  max-width:1200px;
  margin:40px auto;
  padding:0 24px;
}

h2 { font-size:2rem; margin-bottom:16px; }

.availability-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

#editButton {
  padding:6px 16px;
  font-size:1rem;
  background:#6aa6ff;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
#editButton:hover { background:#5590e0; }

/* --- Grid Styles --- */
.edit-wrapper {
  display:flex;
  flex-direction:column;
  gap:4px;
  overflow-x:auto;
}

.days-header {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.days-header div {
  text-align:center;
  font-size:.9rem;
  color:#b9b9cc;
}

.time-grid-wrapper {
  display:grid;
  grid-template-columns:auto 1fr;
  gap:4px;
}

.time-labels {
  display:flex;
  flex-direction:column;
}
.time-labels div {
  height:22px;
  line-height:20px;
  font-size:.7rem;
  color:#b9b9cc;
  text-align:right;
  padding-right:4px;
}

.availability-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}

.availability-cell {
  width:100%;
  height:20px;
  background:#444454;
  border-radius:2px;
}
</style>
</head>

<body>

<header>
  <div class="header-title">
    <img src="icon.png" alt="Studio Icon">
    <h1>Echo Frontier</h1>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="members.html">Members</a>
  <a href="availability.html" class="active">Availability</a>
</nav>

<main>
  <div class="availability-header">
    <h2>Members Availability</h2>
    <button id="editButton" onclick="location='edit.html'">Edit</button>
  </div>

  <div class="edit-wrapper">
    <div class="days-header">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>
    <div class="time-grid-wrapper">
      <div class="time-labels">
        <!-- Example static labels -->
        <div>00:00</div><div>00:30</div>
        <div>01:00</div><div>01:30</div>
        <div>02:00</div><div>02:30</div>
        <!-- Add more labels up to 23:30 -->
      </div>
      <div class="availability-grid">
        <!-- Example grid cells: 7 days x 48 rows -->
        <!-- You can copy/paste divs or leave empty placeholders -->
        <div class="availability-cell"></div>
        <div class="availability-cell"></div>
        <div class="availability-cell"></div>
        <!-- Repeat enough times to visually fill the grid -->
      </div>
    </div>
  </div>
</main>

</body>
</html>
