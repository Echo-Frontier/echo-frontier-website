<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Availability</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,sans-serif; }
body { background:#0f0f14; color:#e6e6eb; }

header { padding:32px 24px 20px; text-align:center; }
.header-title { display:inline-flex; align-items:center; gap:14px; }
.header-title img { height:2.4rem; }
.header-title h1 { font-size:2.4rem; font-weight:600; letter-spacing:.05em; }

nav {
  position:sticky; top:0;
  height:56px;
  background:#151520;
  display:flex;
  justify-content:center;
  align-items:center;
  border-bottom:1px solid #2a2a3a;
}
nav a {
  color:#cfcfe8;
  text-decoration:none;
  margin:0 28px;
  font-weight:500;
}
nav a.active { color:#6aa6ff; }

main {
  max-width:1200px;
  margin:40px auto;
  padding:0 24px;
}

h2 { font-size:2rem; margin-bottom:16px; }

.availability-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

#editButton {
  padding:6px 16px;
  font-size:1rem;
  background:#6aa6ff;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}
#editButton:hover { background:#5590e0; }

/* --- SAME GRID STYLES AS edit.html --- */

.edit-wrapper {
  display:flex;
  flex-direction:column;
  gap:4px;
  overflow-x:auto;
}

.days-header {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.days-header div {
  text-align:center;
  font-size:.9rem;
  color:#b9b9cc;
}

.time-grid-wrapper {
  display:grid;
  grid-template-columns:auto 1fr;
  gap:4px;
}

.time-labels {
  display:flex;
  flex-direction:column;
}
.time-labels div {
  height:22px;
  line-height:20px;
  font-size:.7rem;
  color:#b9b9cc;
  text-align:right;
  padding-right:4px;
}

.availability-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}

.availability-cell {
  width:100%;
  height:20px;
  background:#444454;
  border-radius:2px;
}
</style>
</head>

<body>

<header>
  <div class="header-title">
    <img src="icon.png">
    <h1>Echo Frontier</h1>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="members.html">Members</a>
  <a href="availability.html" class="active">Availability</a>
</nav>

<main>
  <div class="availability-header">
    <h2>Members Availability</h2>
    <button id="editButton" onclick="location='edit.html'">Edit</button>
  </div>

  <div class="edit-wrapper">
    <div class="days-header" id="daysHeader"></div>
    <div class="time-grid-wrapper">
      <div class="time-labels" id="timeLabels"></div>
      <div class="availability-grid" id="availabilityGrid"></div>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.15.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADRD-ZSdmtLAChpCJSg2m-eGD8KkZQLAw",
  authDomain: "echo-frontier.firebaseapp.com",
  projectId: "echo-frontier"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hours = 24, increments = 2, days = 7;
const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const gridEl = document.getElementById("availabilityGrid");
const labelsEl = document.getElementById("timeLabels");
const daysHeaderEl = document.getElementById("daysHeader");

/* Days header */
dayNames.forEach(d=>{
  const div=document.createElement("div");
  div.textContent=d;
  daysHeaderEl.appendChild(div);
});

/* Time labels */
for(let h=0;h<hours;h++){
  for(let i=0;i<increments;i++){
    const t=new Date();
    t.setHours(h,i*30,0,0);
    const div=document.createElement("div");
    div.textContent=t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    labelsEl.appendChild(div);
  }
}

/* Grid */
const cells=[];
for(let row=0;row<hours*increments;row++){
  for(let day=0;day<days;day++){
    const cell=document.createElement("div");
    cell.className="availability-cell";
    cell.dataset.row=row;
    cell.dataset.day=day;
    gridEl.appendChild(cell);
    cells.push(cell);
  }
}

/* Firestore aggregation */
onSnapshot(collection(db,"availability"), snap=>{
  cells.forEach(c=>c.style.background="#444454");

  const members = snap.docs.map(d=>Object.keys(d.data().slots||{}));

  cells.forEach(cell=>{
    const day=parseInt(cell.dataset.day);
    const row=parseInt(cell.dataset.row);

    const hour=Math.floor(row/2);
    const minute=(row%2)*30;

    const utc=new Date();
    utc.setUTCDate(utc.getUTCDate()-utc.getUTCDay()+day);
    utc.setUTCHours(hour,minute,0,0);

    let count=0;
    members.forEach(m=>{ if(m.includes(utc.toISOString())) count++; });

    if(count>0){
      const ratio=count/members.length;
      const blue=Math.floor(100+ratio*155);
      cell.style.background=`rgb(0,0,${blue})`;
    }
  });
});
</script>

</body>
</html>
