<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Availability - Echo Frontier</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="styles.css">
<style>
/* Minimal inline styles to guarantee layout & visuals */
body { background:#0f0f14; color:#e6e6eb; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
header { padding:32px 24px 20px; text-align:center; }
.header-title { display:inline-flex; align-items:center; gap:14px; }
.header-title img { height:2.4rem; width:auto; }
.header-title h1 { font-size:2.4rem; font-weight:600; letter-spacing:0.05em; }

nav { position:sticky; top:0; height:56px; background:#151520; display:flex; justify-content:center; align-items:center; border-bottom:1px solid #2a2a3a; z-index:100; }
nav a { color:#cfcfe8; text-decoration:none; margin:0 28px; font-weight:500; }
nav a.active { color:#6aa6ff; }

main { max-width:1200px; margin:40px auto; padding:0 24px; position:relative; }
h2 { font-size:2rem; margin-bottom:16px; }

/* Buttons */
.edit-button { all: unset; display:inline-block; padding:8px 16px; border-radius:6px; background:#6aa6ff; color:#061025; font-weight:600; cursor:pointer; }
.edit-button:hover { filter:brightness(.95); }
.ctrl-btn { all: unset; display:inline-block; padding:8px 12px; border-radius:6px; background:#6aa6ff; color:#061025; font-weight:600; cursor:pointer; margin-left:8px; }
.ctrl-btn.secondary { background:#d8d8d8; color:#061025; }

/* Grid layout */
.grid-wrapper { display:grid; grid-template-columns:60px 1fr; gap:4px; overflow-x:auto; }
.days-header { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
.days-header div { text-align:center; color:#b9b9cc; font-size:0.9rem; }
.time-labels { display:flex; flex-direction:column; flex-shrink:0; margin-top:24px; }
.time-labels div { height:22px; line-height:20px; font-size:0.7rem; color:#b9b9cc; text-align:right; padding-right:4px; }

.availability-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; width:100%; }
.availability-cell { width:100%; height:20px; background:#444454; border-radius:2px; transition:background 0.12s; }

/* Editable marker and active color */
.availability-cell.editable { cursor:pointer; }
.availability-cell.active { background:#6aa6ff !important; }

/* Login overlay */
#loginOverlay { position: fixed; inset:0; display:none; justify-content:center; align-items:center; z-index:999; background: rgba(0,0,0,0.86); }
.login-card { background:#151520; padding:28px; border-radius:10px; max-width:420px; width:92%; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
.login-card h2 { text-align:center; margin-bottom:18px; color:#e6e6eb; }
.login-card input { all: unset; display:block; width:90%; padding:10px 12px; border-radius:8px; background:#18181c; color:#e6e6eb; border:1px solid #2a2a3a; margin-bottom:12px; }
.login-card input::placeholder { color:#9ea6bf; }
.login-card input:focus { outline:none; border-color:#6aa6ff; box-shadow:0 0 0 6px rgba(106,166,255,0.04); background:#1a1a1f; }
.login-card button { all: unset; display:block; width:90%; text-align:center; padding:12px; border-radius:8px; background: linear-gradient(180deg,#6aa6ff,#5a95e6); color:#061025; font-weight:600; cursor:pointer; }
.login-note { color:#b9b9cc; font-size:0.9rem; text-align:center; margin-top:10px; }

.edit-controls { display:flex; justify-content:flex-end; gap:8px; margin-bottom:12px; }
.edit-controls select { all: unset; display:inline-block; padding:8px 10px; border-radius:6px; background:#18181c; color:#e6e6eb; border:1px solid #2a2a3a; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <img src="icon.png" alt="Studio Icon">
    <h1>Echo Frontier</h1>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="members.html">Members</a>
  <a href="availability.html" class="active">Availability</a>
  <a href="contact.html">Contact</a>
</nav>

<main>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <h2>Members Availability</h2>
    <button id="editBtn" class="edit-button">Edit</button>
  </div>

  <!-- Edit controls (shown during edit) -->
  <div class="edit-controls" id="editControls" style="display:none;">
    <select id="memberSelect">
      <option value="">Select member</option>
      <option value="Speedix08">Speedix08</option>
      <option value="GD_Abomination">GD_Abomination</option>
      <option value="SimLeek">SimLeek</option>
      <option value="Flame">Flame</option>
      <option value="Lele">Lele</option>
    </select>
    <button id="saveBtn" class="ctrl-btn">Save</button>
    <button id="cancelBtn" class="ctrl-btn secondary">Cancel</button>
  </div>

  <div class="grid-wrapper">
    <div class="time-labels" id="timeLabels"></div>

    <div>
      <div class="days-header" id="daysHeader"></div>
      <div class="availability-grid" id="availabilityGrid" aria-live="polite"></div>
    </div>
  </div>
</main>

<!-- Login overlay -->
<div id="loginOverlay" role="dialog" aria-modal="true">
  <div class="login-card" role="document" aria-labelledby="loginTitle">
    <h2 id="loginTitle">Member Login</h2>
    <input id="loginUser" type="text" placeholder="Username" autocomplete="username" />
    <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="loginSubmit">Login</button>
    <div class="login-note">Login persists locally so you stay signed in across pages.</div>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const HOURS = 24;
const INCREMENTS = 2; // half-hour
const ROWS = HOURS * INCREMENTS;

const LOGIN_USER = 'EchoFrontier';
const LOGIN_PASS = '3ch0Fr0ntier';

/* JSONBin config */
const BIN_ID = "6971832743b1c97be94097bd"; // set your real bin id
const JSONBIN_API_KEY = "$2a$10$edrLHMqxcyBUAdf6kSKuOeInAbA8ZzPVUdLe4pntkXe1BGw5RJCSe"; // set your master key
const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";

/* ================= ELEMENTS ================= */
const daysHeaderEl = document.getElementById('daysHeader');
const labelsEl = document.getElementById('timeLabels');
const gridEl = document.getElementById('availabilityGrid');

const editBtn = document.getElementById('editBtn');
const editControls = document.getElementById('editControls');
const memberSelect = document.getElementById('memberSelect');
const saveBtn = document.getElementById('saveBtn');
const cancelBtn = document.getElementById('cancelBtn');

const loginOverlay = document.getElementById('loginOverlay');
const loginUser = document.getElementById('loginUser');
const loginPass = document.getElementById('loginPass');
const loginSubmit = document.getElementById('loginSubmit');

/* ================= STATE ================= */
let isEditing = false;
let isDragging = false;
let dragState = null;
let binData = null;

/* ================= BUILD GRID ================= */
function buildGrid() {
  days.forEach(d => {
    const div = document.createElement('div');
    div.textContent = d;
    daysHeaderEl.appendChild(div);
  });

  for (let h = 0; h < HOURS; h++) {
    for (let i = 0; i < INCREMENTS; i++) {
      const div = document.createElement('div');
      const date = new Date();
      date.setHours(h, i * 30, 0, 0);
      div.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      labelsEl.appendChild(div);
    }
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < 7; c++) {
      const cell = document.createElement('div');
      cell.className = 'availability-cell';
      cell.dataset.index = (r * 7 + c).toString();

      cell.addEventListener('mousedown', e => {
        if (!isEditing || e.button !== 0) return;
        e.preventDefault();
        isDragging = true;
        dragState = !cell.classList.contains('active');
        cell.classList.toggle('active', dragState);
      });
      cell.addEventListener('mouseenter', () => {
        if (!isEditing || !isDragging) return;
        cell.classList.toggle('active', dragState);
      });

      gridEl.appendChild(cell);
    }
  }

  document.addEventListener('mouseup', () => { isDragging = false; dragState = null; });
}
buildGrid();

/* ================= HELPERS ================= */
function isLoggedIn(){ return localStorage.getItem('ef-auth') === 'true'; }
function clearAllCells(){ [...gridEl.children].forEach(c=>{ c.classList.remove('active'); c.style.background = ''; }); }

/* Use a stable reference week to convert between UTC storage and local display */
function utcToLocalIndex(hourUTC, minuteUTC, dayUTC) {
  const utcMillis = Date.UTC(1970, 0, 4 + dayUTC, hourUTC, minuteUTC, 0);
  const local = new Date(utcMillis);
  const localDay = local.getDay();
  const localHour = local.getHours();
  const localMinute = local.getMinutes();
  const row = localHour * INCREMENTS + (localMinute >= 30 ? 1 : 0);
  return row * 7 + localDay;
}

function localIndexToUtc(row, col) {
  const localHour = Math.floor(row / INCREMENTS);
  const localMinute = (row % INCREMENTS) * 30;
  // local weekday = col (0-6)
  const localDate = new Date(1970, 0, 4 + col, localHour, localMinute, 0);
  return { day: localDate.getUTCDay(), hourUTC: localDate.getUTCHours(), minuteUTC: localDate.getUTCMinutes() };
}

/* ================= JSONBin: normalize + read/write ================= */
/* Unwrap nested .record layers until we reach the deepest object that isn't just a wrapper */
function unwrapRecordLayers(obj) {
  let cur = obj;
  // If fetch returned an object with "record" wrapper (possibly nested), unwrap
  while (cur && typeof cur === 'object' && 'record' in cur && typeof cur.record === 'object') {
    cur = cur.record;
  }
  return cur;
}

async function fetchBin() {
  if (!BIN_ID) return null;
  const headers = JSONBIN_API_KEY ? { 'X-Master-Key': JSONBIN_API_KEY } : {};
  const url = `${JSONBIN_BASE}/${BIN_ID}/latest`;
  const resp = await fetch(url, { headers, cache: 'no-store' });
  if (!resp.ok) throw new Error(`Fetch failed ${resp.status}`);
  const json = await resp.json();
  const unwrapped = unwrapRecordLayers(json);
  // ensure shape
  let data = unwrapped && typeof unwrapped === 'object' ? unwrapped : {};
  if (!Array.isArray(data.members)) data.members = membersFromDefault();
  data.members.forEach(m => { if (!Array.isArray(m.availability)) m.availability = []; });
  return data;
}

/* Put must write a single clean record object (no nested `record`) then re-fetch authoritative copy */
async function putBinReplace(newData) {
  if (!BIN_ID) throw new Error('BIN_ID not set');
  if (!JSONBIN_API_KEY) throw new Error('Missing JSONBIN_API_KEY for writes');

  // Build a clean payload (avoid nested "record" fields that might exist in newData)
  const clean = {
    members: Array.isArray(newData.members) ? newData.members : [],
    lastUpdated: newData.lastUpdated || new Date().toISOString()
  };

  const url = `${JSONBIN_BASE}/${BIN_ID}`;
  const resp = await fetch(url, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    },
    body: JSON.stringify({ record: clean })
  });

  if (!resp.ok) {
    const txt = await resp.text().catch(()=>'<no body>');
    throw new Error(`JSONBin PUT failed ${resp.status}: ${txt}`);
  }

  // Re-fetch authoritative data and return it (prevents client/server shape mismatch)
  try {
    const fresh = await fetchBin();
    return fresh;
  } catch (e) {
    // If re-fetch fails, return the clean object as best-effort
    console.warn('Re-fetch after PUT failed, returning clean payload', e);
    return clean;
  }
}

/* ================= MEMBERS & UI ================= */
function membersFromDefault() {
  return [
    { id: 1, name: "Speedix08", availability: [] },
    { id: 2, name: "GD_Abomination", availability: [] },
    { id: 3, name: "SimLeek", availability: [] },
    { id: 4, name: "Flame", availability: [] },
    { id: 5, name: "Lele", availability: [] }
  ];
}

function populateMemberSelect() {
  const prev = memberSelect.value || '';
  memberSelect.innerHTML = '';
  const blank = document.createElement('option'); blank.value = ''; blank.textContent = 'Select member';
  memberSelect.appendChild(blank);
  const list = (binData && Array.isArray(binData.members)) ? binData.members : membersFromDefault();
  list.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.name;
    opt.textContent = m.name;
    memberSelect.appendChild(opt);
  });
  if (prev) {
    const found = [...memberSelect.options].some(o => o.value === prev);
    if (found) memberSelect.value = prev;
  }
}

/* ================= RENDERING ================= */
function applyGradientOverlay() {
  clearAllCells();
  if (!binData || !Array.isArray(binData.members)) return;

  const counts = {};
  binData.members.forEach(member => {
    if (!Array.isArray(member.availability)) return;
    member.availability.forEach(({ day, hourUTC, minuteUTC }) => {
      if (typeof day !== 'number' || typeof hourUTC !== 'number') return;
      const idx = utcToLocalIndex(hourUTC, minuteUTC, day);
      counts[idx] = (counts[idx] || 0) + 1;
    });
  });

  const cells = [...gridEl.children];
  Object.entries(counts).forEach(([idxStr, count]) => {
    const idx = Number(idxStr);
    if (!Number.isFinite(idx) || idx < 0 || idx >= cells.length) return;
    const intensity = Math.min(count, 5) / 5;
    const opacity = 0.2 + 0.8 * intensity;
    cells[idx].style.background = `rgba(106,166,255,${opacity})`;
  });
}

function loadMemberForEdit(memberName) {
  clearAllCells();
  if (!memberName || !binData || !Array.isArray(binData.members)) return;
  const member = binData.members.find(m => m.name === memberName);
  if (!member || !Array.isArray(member.availability)) return;
  const cells = [...gridEl.children];
  member.availability.forEach(({ day, hourUTC, minuteUTC }) => {
    if (typeof day !== 'number' || typeof hourUTC !== 'number') return;
    const idx = utcToLocalIndex(hourUTC, minuteUTC, day);
    if (cells[idx]) cells[idx].classList.add('active');
  });
}

/* ================= LOGIN/AUTH ================= */
editBtn.addEventListener('click', () => {
  if (isLoggedIn()) enterEditMode();
  else { loginOverlay.style.display = 'flex'; loginUser.focus(); }
});
loginSubmit.addEventListener('click', () => {
  if (loginUser.value.trim() === LOGIN_USER && loginPass.value === LOGIN_PASS) {
    localStorage.setItem('ef-auth', 'true');
    loginOverlay.style.display = 'none';
    enterEditMode();
  } else {
    alert('Invalid credentials');
  }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape' && loginOverlay.style.display === 'flex') loginOverlay.style.display = 'none'; });

/* ================= EDIT MODE ================= */
function enterEditMode() {
  if (isEditing) return;
  isEditing = true;
  editControls.style.display = 'flex';
  editBtn.style.display = 'none';
  [...gridEl.children].forEach(c => { c.classList.add('editable'); c.style.background = ''; });
  clearAllCells();
  memberSelect.focus();
}

function exitEditMode() {
  if (!isEditing) return;
  isEditing = false;
  editControls.style.display = 'none';
  editBtn.style.display = 'inline-block';
  [...gridEl.children].forEach(c => { c.classList.remove('editable'); c.classList.remove('active'); c.style.background = ''; });
  applyGradientOverlay();
}

/* ================= EVENTS ================= */
memberSelect.addEventListener('change', () => {
  if (!binData) return;
  if (isEditing) loadMemberForEdit(memberSelect.value);
  else applyGradientOverlay();
});

/* ================= SAVE (uses putBinReplace to avoid double-wrapping) ================= */
async function saveBtnHandler() {
  const memberName = memberSelect.value;
  if (!memberName) { alert('Select a member before saving'); return; }

  const cells = [...gridEl.children];
  const newAvailability = [];
  cells.forEach((cell, i) => {
    if (!cell.classList.contains('active')) return;
    const row = Math.floor(i / 7);
    const col = i % 7; // local weekday
    const { day, hourUTC, minuteUTC } = localIndexToUtc(row, col);
    if (!newAvailability.find(e => e.day === day && e.hourUTC === hourUTC && e.minuteUTC === minuteUTC)) {
      newAvailability.push({ day, hourUTC, minuteUTC });
    }
  });

  if (!binData) binData = { members: membersFromDefault(), lastUpdated: null };
  if (!Array.isArray(binData.members)) binData.members = membersFromDefault();

  let member = binData.members.find(m => m.name === memberName);
  if (!member) {
    member = { id: binData.members.length + 1, name: memberName, availability: [] };
    binData.members.push(member);
  }
  member.availability = newAvailability;
  binData.lastUpdated = new Date().toISOString();

  // write back cleanly and re-fetch authoritative copy
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';
  try {
    const authoritative = await putBinReplace(binData);
    // authoritative is normalized bin object
    if (authoritative && Array.isArray(authoritative.members)) binData = authoritative;
    // mirror locally
    try { localStorage.setItem('availability-' + memberName, JSON.stringify(member.availability)); } catch(e){}
    populateMemberSelect();
    exitEditMode();
    alert('Saved successfully.');
  } catch (err) {
    console.error('Save failed:', err);
    // fallback local save
    try {
      localStorage.setItem('availability-' + memberName, JSON.stringify(newAvailability));
      exitEditMode();
      alert('Save to JSONBin failed; saved locally instead.');
    } catch (e) {
      alert('Save failed (remote and local). Check console.');
    }
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  }
}
saveBtn.addEventListener('click', saveBtnHandler);
cancelBtn.addEventListener('click', exitEditMode);

/* ================= INITIAL LOAD (normalize & merge local) ================= */
async function initialLoad() {
  try {
    const fetched = await fetchBin();
    if (fetched && Array.isArray(fetched.members)) binData = fetched;
    else binData = { members: membersFromDefault(), lastUpdated: null };
  } catch (e) {
    console.warn('Initial fetch failed; falling back to defaults', e);
    binData = { members: membersFromDefault(), lastUpdated: null };
  }

  // merge any localStorage entries for offline edits
  try {
    binData.members.forEach(m => {
      const raw = localStorage.getItem('availability-' + m.name);
      if (!raw) return;
      try {
        const saved = JSON.parse(raw);
        if (!Array.isArray(saved)) return;
        saved.forEach(entry => {
          if (!m.availability.find(e => e.day === entry.day && e.hourUTC === entry.hourUTC && e.minuteUTC === entry.minuteUTC)) {
            m.availability.push(entry);
          }
        });
      } catch(_) {}
    });
  } catch(_) {}

  populateMemberSelect();
  applyGradientOverlay();
  if (isLoggedIn()) editBtn.style.display = 'inline-block';
}
initialLoad();

</script>


</body>
</html>
