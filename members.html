<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Members - Echo Frontier</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-title">
    <img src="icon.png" alt="Studio Icon">
    <h1>Echo Frontier</h1>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="members.html" class="active">Members</a>
  <a href="availability.html">Availability</a>
  <a href="contact.html">Contact</a>
</nav>


<main>
  <h2>Members</h2>

  <div class="members-grid" id="members-grid">
    <!-- Member cards will be injected here -->
  </div>
</main>

<script>
  // Absolute path relative to repo root
  const jsonPath = './data/team.json';

  fetch(jsonPath)
    .then(response => {
      if (!response.ok) throw new Error('Failed to fetch team.json: ' + response.status);
      return response.json();
    })
    .then(team => {
      const container = document.getElementById('members-grid');
      container.innerHTML = '';

      team.forEach(member => {
        const card = document.createElement('div');
        card.className = 'member-card';

        // Use the same avatar path as in JSON
        card.innerHTML = `
          <img src="${member.avatar}" alt="${member.name}">
          <div class="member-name">${member.name}</div>
          <div class="member-title">${member.title}</div>
        `;

        container.appendChild(card);
      });
    })
    .catch(err => {
      const container = document.getElementById('members-grid');
      container.innerHTML = '<p>Failed to load team members. Check console.</p>';
      console.error(err);
    });
</script>

</body>
</html>
