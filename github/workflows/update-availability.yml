name: Update Availability JSON

on:
  repository_dispatch:
    types: [update-availability]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update availability.json
        run: |
          mkdir -p data
          echo '${{ github.event.client_payload.json }}' > data/availability.json
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/availability.json
          git commit -m "Update availability.json [skip ci]" || echo "No changes to commit"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_AVAILABILITY }}
